name: Deploy to GitHub Pages

# Builds the dashboard and publishes it to GitHub Pages on every push to main.
# The Salesforce client ID / login URL come from repository Variables (not secrets
# — the PKCE client ID is public). Set them under:
#   Settings > Secrets and variables > Actions > Variables
#     VITE_SF_CLIENT_ID   = the Connected App consumer key
#     VITE_SF_LOGIN_URL   = https://<your-my-domain>.my.salesforce.com  (optional)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
          VITE_SF_CLIENT_ID: ${{ vars.VITE_SF_CLIENT_ID }}
          VITE_SF_LOGIN_URL: ${{ vars.VITE_SF_LOGIN_URL }}
        run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
